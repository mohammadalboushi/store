<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M.Al.Boushi Store</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="style.css"> 
</head>
<body>

    <header>
        <div class="logo">M<span>.Al.Boushi</span></div>
        <div class="header-left">
            <i class="fas fa-moon icon-btn" id="themeBtn" onclick="toggleTheme()"></i>
            <i class="fas fa-bars icon-btn" onclick="openNav()"></i>
        </div>
    </header>

    <div id="mySidebar" class="sidebar">
        <button class="close-btn" onclick="closeNav()">&times;</button>
        <div class="sidebar-header">
            <img src="https://midomido.neocities.org/mohammadalboushi.png" alt="Profile" class="profile-img" id="sidebarProfileImg">
            <h3 style="margin:10px 0; color:var(--text-main);">Mohammad Al Boushi</h3>
            <p id="sidebarBio" style="color:var(--text-muted); font-size:0.8rem; padding:0 10px; line-height:1.4;">
                جاري التحميل...
            </p>
        </div>
        <div id="sidebarLinksContainer"></div>
    </div>
    <div id="overlay" onclick="closeNav()"></div>

    <div id="imgViewer">
        <span class="close-viewer" onclick="closeViewer()">&times;</span>
        <img id="fullImage">
        <a id="downloadBtn" href="#" download="image.jpg" class="get-btn" style="width: auto; padding: 8px 30px; margin-top: 20px; background: var(--primary); color: white; border: none;">⬇️ تحميل الصورة</a>
    </div>

    <div class="hero">
        <h1>متجر التطبيقات</h1>
        <p>وجهتك الأولى للتطبيقات المعدلة والحلول الذكية</p>
        
        <div class="stats">
            <div class="stat-item">
                <span class="stat-num" id="appCount">0</span><span class="stat-lbl">تطبيق</span>
            </div>
            <div class="stat-item">
                <span class="stat-num">5K+</span><span class="stat-lbl">تنزيل</span>
            </div>
            <div class="stat-item">
                <span class="stat-num">4.9</span><span class="stat-lbl">تقييم</span>
            </div>
        </div>

        <div class="search-container">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="searchInput" class="search-box" placeholder="ابحث عن تطبيق، لعبة، أو ملف...">
        </div>
    </div>

    <div class="tabs-wrapper">
        <div class="tabs-container" id="tabsList"></div>
    </div>

    <div class="grid" id="container">
        <div class="status"><i class="fas fa-circle-notch fa-spin"></i> جاري الاتصال بالسيرفر...</div>
    </div>

    <footer>&copy; 2026 M.Al.Boushi Store - جميع الحقوق محفوظة</footer>

<script type="module" src="script.js"></script> 
</body>
</html>
